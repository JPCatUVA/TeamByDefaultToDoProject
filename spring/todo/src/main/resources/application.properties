spring.application.name=todo

# This one tells Spring where the DB is
spring.datasource.url=jdbc:sqlite:todo.db

# Enable SQLite foreign key enforcement (required for ON DELETE CASCADE)
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys = ON;

# This one tells Spring
spring.datasource.driver-class-name=org.sqlite.JDBC

# This one tells Spring what flavor of SQL to use
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# This one tells Spring how to handle schema changes
# 'update' preserves existing data and only applies new schema changes
spring.jpa.hibernate.ddl-auto=update

# This one tells Spring to log the SQL queries it makes
spring.jpa.show-sql=true

# This one makes the queries logged above a bit easier to read
spring.jpa.properties.hibernate.format_sql=true